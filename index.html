<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>Dashboard Centro Técnico</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- SheetJS para ler Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="dashboard">
        <!-- Cabeçalho -->
        <header class="dashboard-header">
            <div class="header-title">
                <h1>🔧 Centro Técnico - Painel de Monitorização</h1>
                <span class="data-ref" id="dataReferencia">Carregando...</span>
            </div>
            <div class="header-controls">
                <button id="btnAtualizar" class="btn-atualizar">
                    <span class="material-icons">refresh</span>
                    Carregar Excel
                </button>
                <select id="periodoSelect" class="select-periodo">
                    <option value="hoje">Hoje</option>
                    <option value="semana" selected>Esta Semana</option>
                    <option value="mes">Este Mês</option>
                    <option value="trimestre">Este Trimestre</option>
                </select>
            </div>
        </header>

        <!-- KPIs Globais -->
        <section class="kpis-globais">
            <div class="kpi-card global">
                <span class="kpi-icon material-icons">inventory</span>
                <div class="kpi-content">
                    <span class="kpi-label">Total Análises</span>
                    <span class="kpi-value" id="totalEntradas">-</span>
                </div>
            </div>
            <div class="kpi-card global">
                <span class="kpi-icon material-icons">schedule</span>
                <div class="kpi-content">
                    <span class="kpi-label">TAT Médio</span>
                    <span class="kpi-value" id="tatMedio">-</span>
                    <span class="kpi-unit">dias</span>
                </div>
            </div>
            <div class="kpi-card global">
                <span class="kpi-icon material-icons">check_circle</span>
                <div class="kpi-content">
                    <span class="kpi-label">% Sucesso</span>
                    <span class="kpi-value" id="taxaSucessoGlobal">-</span>
                    <span class="kpi-unit">%</span>
                </div>
            </div>
            <div class="kpi-card global">
                <span class="kpi-icon material-icons">attach_money</span>
                <div class="kpi-content">
                    <span class="kpi-label">Orçamentos</span>
                    <span class="kpi-value" id="nssMedio">-</span>
                </div>
            </div>
            <div class="kpi-card global">
                <span class="kpi-icon material-icons">hourglass_empty</span>
                <div class="kpi-content">
                    <span class="kpi-label">Aguarda</span>
                    <span class="kpi-value" id="produtividadeGlobal">-</span>
                </div>
            </div>
        </section>

        <!-- Áreas de Negócio -->
        <div class="areas-grid" id="areasGrid">
            <!-- O JavaScript vai preencher aqui -->
        </div>

        <!-- Rodapé -->
        <footer class="dashboard-footer">
            <div class="footer-stats">
                <span><strong>Total registos:</strong> <span id="totalReparacoes">-</span></span>
                <span><strong>Em aberto:</strong> <span id="emAndamento">-</span></span>
                <span><strong>Check-ins hoje:</strong> <span id="concluidasHoje">-</span></span>
                <span><strong>Última atualização:</strong> <span id="ultimaAtualizacao">-</span></span>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
